<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A simple event component</title>
    <meta name="description" content="A simple event component" />

    <link rel="icon" href="https://fav.farm/🖥" />
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <section class="section-holder">
        <div class="event">
          <div class="event__date">
            <p class="event__date__item date__number">7</p>
            <p class="event__date__item date__month">Feb</p>
          </div>
          <div class="event__info">
            <div class="event__info_row_item">
              <p class="event__title">UI / UX design conference</p>
            </div>
            <div class="event__info_row_item">
              <div class="event__time__icon">
                <img
                  width="25"
                  height="25"
                  src="https://img.icons8.com/ios/50/clock--v1.png"
                  alt="clock--v1"
                />
              </div>
              <p class="event__time__text">tomorrow 13:00 (GMT +2)</p>
            </div>
            <div class="event__info_row_item">
              <img
                width="25"
                height="25"
                src="https://img.icons8.com/ios/50/globe--v1.png"
                alt="globe--v1"
              />
              <p class="event__location__text">online</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
